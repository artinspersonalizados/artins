<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestor Pro v10.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            #documento-impressao { display: block !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="conteudo-sistema" class="max-w-5xl mx-auto my-4 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <div class="bg-gray-50 p-2 flex flex-wrap gap-1.5 justify-center border-b border-gray-200 no-print">
            <button onclick="mudarAba('aba-materiais')" class="aba-btn bg-black text-white px-3 py-2 rounded-lg text-xs">1. Papéis</button>
            <button onclick="mudarAba('aba-orcamento')" class="aba-btn bg-gray-200 px-3 py-2 rounded-lg text-xs">5. Montar</button>
            <button onclick="mudarAba('aba-gerar-pedido')" class="aba-btn bg-gray-200 px-3 py-2 rounded-lg text-xs font-bold">📋 7. Orçamento/Sincronizar</button>
        </div>

        <div class="p-6">
            <div id="aba-gerar-pedido" class="aba-conteudo hidden">
                <div class="bg-blue-50 p-4 rounded-xl mb-6 border border-blue-200 no-print">
                    <h3 class="text-xs font-bold text-blue-800 uppercase mb-2">🔄 Sincronizar PC e Celular</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportarDados()" class="bg-blue-600 text-white text-[10px] font-bold p-2 rounded-lg">📤 Exportar Backup do PC</button>
                        <div class="relative">
                            <input type="file" id="inputImport" class="hidden" onchange="importarDados(event)">
                            <button onclick="document.getElementById('inputImport').click()" class="w-full bg-green-600 text-white text-[10px] font-bold p-2 rounded-lg">📥 Importar no Celular</button>
                        </div>
                    </div>
                </div>

                <input type="text" id="clienteNome" placeholder="Nome do Cliente" class="w-full p-2 border mb-2 rounded text-sm">
                <input type="text" id="clienteContato" placeholder="WhatsApp do Cliente" class="w-full p-2 border mb-2 rounded text-sm">
                
                <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-bold p-4 rounded-xl mt-4">📲 ENVIAR PARA WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        // FUNÇÕES DE SINCRONIZAÇÃO (ADICIONE AO SEU SCRIPT)
        function exportarDados() {
            const backup = {
                materiais: localStorage.getItem('local_materiais'),
                bases: localStorage.getItem('local_produtosBase'),
                embalagens: localStorage.getItem('local_embalagens'),
                maquinas: localStorage.getItem('local_maquinas'),
                catalogo: localStorage.getItem('local_catalogoProdutos'),
                empresa: localStorage.getItem('local_dadosMinhaEmpresa')
            };
            const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_sistema.json';
            a.click();
        }

        function importarDados(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const dados = JSON.parse(e.target.result);
                if(dados.materiais) localStorage.setItem('local_materiais', dados.materiais);
                if(dados.bases) localStorage.setItem('local_produtosBase', dados.bases);
                if(dados.catalogo) localStorage.setItem('local_catalogoProdutos', dados.catalogo);
                if(dados.empresa) localStorage.setItem('local_dadosMinhaEmpresa', dados.empresa);
                alert("Sincronizado com sucesso!");
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }

        // COLOQUE AQUI O RESTANTE DO SEU SCRIPT ORIGINAL (mudarAba, enviarWhatsApp, etc)
        function mudarAba(id) {
            document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
