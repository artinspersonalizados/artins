<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo-app.png">
<link rel="apple-touch-icon" href="logo-app.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestor Pro v10.2 - Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            #aba-gerar-pedido { padding: 0 !important; background: white !important; }
            #documento-impressao { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="tela-login" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-gray-200 text-center">
            <div class="bg-black text-white w-12 h-12 rounded-xl flex items-center justify-center text-xl font-black mx-auto mb-2">G</div>
            <h2 class="text-xl font-bold text-gray-900">Gestor Pro</h2>
            <input type="password" id="senhaAcesso" placeholder="Senha: 270217" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm mt-4 focus:outline-black text-center">
            <button onclick="verificarSenha()" class="w-full bg-black text-white p-2.5 rounded-lg font-bold text-sm mt-3 hover:bg-gray-800">Acessar Painel</button>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-5xl mx-auto my-4 md:my-8 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200 no-print">
        
        <div class="bg-black p-4 px-6 text-white flex justify-between items-center">
            <h1 class="text-lg font-bold">GESTOR DE ORÇAMENTOS</h1>
            <button onclick="bloquearSistema()" class="text-xs font-bold text-gray-400 hover:text-white">Bloquear 🔒</button>
        </div>

        <div class="bg-gray-50 p-2 flex flex-wrap gap-1.5 justify-center border-b border-gray-200">
            <button onclick="mudarAba('aba-materiais')" id="btn-aba-materiais" class="aba-btn bg-black text-white px-3 py-2 rounded-lg text-xs">1. Papéis</button>
            <button onclick="mudarAba('aba-produtos-base')" id="btn-aba-produtos-base" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs">2. Bases</button>
            <button onclick="mudarAba('aba-embalagens')" id="btn-aba-embalagens" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs">3. Embalagens</button>
            <button onclick="mudarAba('aba-maquinas')" id="btn-aba-maquinas" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs">4. Máquinas</button>
            <button onclick="mudarAba('aba-orcamento')" id="btn-aba-orcamento" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs font-bold border border-black">🛠️ 5. Montar</button>
            <button onclick="mudarAba('aba-gerar-pedido')" id="btn-aba-gerar-pedido" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs font-bold border border-gray-400">📋 6. Orçamento / Sync</button>
            <button onclick="mudarAba('aba-historico')" id="btn-aba-historico" class="aba-btn bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs font-bold border border-gray-400">📁 7. Histórico</button>
        </div>

        <div class="p-6">
            <div id="aba-materiais" class="aba-conteudo">
                <h2 class="text-sm font-bold uppercase mb-2">Cadastro de Papéis</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 bg-gray-50 p-4 rounded-xl mb-4 border">
                    <input type="text" id="matNome" placeholder="Nome do Papel" class="p-2 border rounded text-sm"><input type="number" id="matPreco" placeholder="Preço" class="p-2 border rounded text-sm"><input type="number" id="matQtd" placeholder="Qtd" class="p-2 border rounded text-sm"><input type="number" id="matPerda" value="5" class="p-2 border rounded text-sm">
                    <button onclick="adicionarMaterial()" class="md:col-span-4 bg-black text-white p-2 rounded text-sm font-bold">Salvar Material</button>
                </div>
                <table class="w-full text-xs text-left border-collapse"><tbody id="tabelaMateriais"></tbody></table>
            </div>

            <div id="aba-produtos-base" class="aba-conteudo hidden">
                 <h2 class="text-sm font-bold uppercase mb-2">Produtos Base</h2>
                 <div class="grid grid-cols-1 md:grid-cols-3 gap-3 bg-gray-50 p-4 rounded-xl mb-4 border">
                    <input type="text" id="baseNome" placeholder="Nome" class="p-2 border rounded text-sm"><input type="number" id="basePreco" placeholder="Preço" class="p-2 border rounded text-sm"><input type="number" id="basePerda" value="5" class="p-2 border rounded text-sm">
                    <button onclick="adicionarProdutoBase()" class="md:col-span-3 bg-black text-white p-2 rounded text-sm font-bold">Salvar Base</button>
                </div>
                <table class="w-full text-xs text-left border-collapse"><tbody id="tabelaProdutosBase"></tbody></table>
            </div>
            
            <div id="aba-embalagens" class="aba-conteudo hidden">
                <h2 class="text-sm font-bold uppercase mb-2">Embalagens</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 bg-gray-50 p-4 rounded-xl mb-4 border">
                    <input type="text" id="embNome" placeholder="Nome" class="p-2 border rounded text-sm"><input type="number" id="embPreco" placeholder="Preço" class="p-2 border rounded text-sm"><input type="number" id="embQtd" placeholder="Qtd" class="p-2 border rounded text-sm"><input type="number" id="embPerda" value="2" class="p-2 border rounded text-sm">
                    <button onclick="adicionarEmbalagem()" class="md:col-span-4 bg-black text-white p-2 rounded text-sm font-bold">Salvar Embalagem</button>
                </div>
                <table class="w-full text-xs text-left border-collapse"><tbody id="tabelaEmbalagens"></tbody></table>
            </div>

            <div id="aba-maquinas" class="aba-conteudo hidden">
                <h2 class="text-sm font-bold uppercase mb-2">Máquinas</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-gray-50 p-4 rounded-xl border">
                    <input type="text" id="maqNome" placeholder="Nome" class="p-2 border rounded text-sm md:col-span-2">
                    <input type="number" id="maqTinta" placeholder="Tinta" class="p-2 border rounded text-sm" value="0.00">
                    <input type="number" id="maqEnergia" placeholder="Energia" class="p-2 border rounded text-sm" value="0.00">
                    <button onclick="adicionarMaquina()" class="md:col-span-2 bg-black text-white p-2 rounded text-sm font-bold">Salvar Máquina</button>
                </div>
                <table class="w-full text-xs text-left border-collapse mt-4"><tbody id="tabelaMaquinas"></tbody></table>
            </div>

            <div id="aba-orcamento" class="aba-conteudo hidden">
                <div class="bg-gray-900 text-white p-4 rounded-xl mb-4">
                    <input type="text" id="nomeProdutoCalculado" value="Novo Produto" class="w-full p-2 bg-gray-800 rounded text-sm font-bold mb-2">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="selectMat" class="p-1 border rounded text-black text-xs"></select>
                        <button onclick="adicionarComponente('mat')" class="bg-white text-black text-xs font-bold px-2 py-1 rounded">+</button>
                    </div>
                </div>
                <table class="w-full text-xs bg-white border mb-4"><tbody id="tabelaOrcamentoAtual"></tbody></table>
                <div class="bg-gray-100 p-4 rounded text-center border-2 border-black">
                    <span class="text-xl font-black" id="resPrecoVenda">Preço: R$ 0,00</span><br>
                    <button onclick="jogarProdutoNoPedido()" class="bg-green-700 text-white px-4 py-2 rounded mt-2 font-bold text-xs">Adicionar ao Pedido</button>
                </div>
            </div>

            <div id="aba-gerar-pedido" class="aba-conteudo hidden">
                <div class="bg-blue-600 text-white p-4 rounded-2xl mb-6 shadow-lg no-print">
                    <h3 class="text-xs font-black uppercase mb-3">🔄 Sincronizar (PC -> iPhone)</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="exportarDados()" class="bg-white text-blue-600 font-bold p-3 rounded-xl text-[10px]">📤 Exportar do PC</button>
                        <div class="relative">
                            <input type="file" id="inputImport" class="hidden" onchange="importarDados(event)">
                            <button onclick="document.getElementById('inputImport').click()" class="w-full bg-blue-900 text-white font-bold p-3 rounded-xl text-[10px]">📥 Importar no Celular</button>
                        </div>
                    </div>
                </div>

                <input type="text" id="clienteNome" placeholder="Nome do Cliente" class="w-full p-2 border mb-2 rounded text-sm">
                <input type="text" id="clienteContato" placeholder="WhatsApp" class="w-full p-2 border mb-2 rounded text-sm">
                
                <table class="w-full text-xs mb-4"><tbody id="tabelaItensTelaOrcamento"></tbody></table>

                <div class="flex gap-2 justify-end no-print">
                    <button onclick="enviarWhatsApp()" class="bg-green-600 text-white font-bold px-4 py-2 rounded text-xs">WhatsApp</button>
                    <button onclick="window.print()" class="bg-black text-white font-bold px-4 py-2 rounded text-xs">Gerar PDF</button>
                </div>
            </div>

            <div id="aba-historico" class="aba-conteudo hidden">
                <table class="w-full text-xs text-left"><tbody id="listaHistoricoOrcamentos"></tbody></table>
            </div>
        </div>
    </div>

    <div id="documento-impressao" class="hidden print:block bg-white p-10 text-sm">
        <h2 id="printEmpresaNome" class="text-xl font-bold">ORÇAMENTO</h2>
        <p>Cliente: <span id="printClienteNome"></span></p>
        <table class="w-full mt-4 border-t border-black"><tbody id="tabelaItensDoPedido"></tbody></table>
    </div>

    <script>
        const SENHA_CORRETA = "270217"; 
        let materiais = [], produtosBase = [], embalagens = [], maquinas = [], orcamentoAtual = [], pedidoCliente = [], orcamentosSalvos = [];

        function verificarSenha() { if(document.getElementById('senhaAcesso').value === SENHA_CORRETA) { document.getElementById('tela-login').classList.add('hidden'); document.getElementById('conteudo-sistema').classList.remove('hidden'); carregarDadosDoNavegador(); } else { alert("Erro!"); } }
        function bloquearSistema() { location.reload(); }

        function carregarDadosDoNavegador() {
            materiais = JSON.parse(localStorage.getItem('local_materiais')) || [];
            produtosBase = JSON.parse(localStorage.getItem('local_produtosBase')) || [];
            embalagens = JSON.parse(localStorage.getItem('local_embalagens')) || [];
            maquinas = JSON.parse(localStorage.getItem('local_maquinas')) || [];
            orcamentosSalvos = JSON.parse(localStorage.getItem('local_orcamentosSalvos')) || [];
            renderizarTudo();
        }

        function salvarDadosNoNavegador() {
            localStorage.setItem('local_materiais', JSON.stringify(materiais));
            localStorage.setItem('local_produtosBase', JSON.stringify(produtosBase));
            localStorage.setItem('local_embalagens', JSON.stringify(embalagens));
            localStorage.setItem('local_maquinas', JSON.stringify(maquinas));
            localStorage.setItem('local_orcamentosSalvos', JSON.stringify(orcamentosSalvos));
        }

        // --- FUNÇÕES DE SINCRONIZAÇÃO ---
        function exportarDados() {
            const backup = { m: materiais, b: produtosBase, e: embalagens, maq: maquinas, h: orcamentosSalvos };
            const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'backup_sistema.json'; a.click();
        }

        function importarDados(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const d = JSON.parse(e.target.result);
                if(d.m) materiais = d.m; if(d.b) produtosBase = d.b; if(d.e) embalagens = d.e; if(d.maq) maquinas = d.maq; if(d.h) orcamentosSalvos = d.h;
                salvarDadosNoNavegador();
                alert("Sincronizado! A página vai recarregar.");
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }

        // --- LÓGICA DE UI ---
        function mudarAba(id) {
            document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            atualizarDocumentoFinal();
        }

        function adicionarMaterial() {
            const n = document.getElementById('matNome').value, p = parseFloat(document.getElementById('matPreco').value), q = parseInt(document.getElementById('matQtd').value), perd = parseFloat(document.getElementById('matPerda').value);
            materiais.push({ nome: n, total: (p / q) * (1 + (perd / 100)) });
            salvarDadosNoNavegador(); renderizarTudo();
        }

        function renderizarTudo() {
            let t = (arr, el, id) => {
                let d = document.getElementById(el); d.innerHTML = '';
                arr.forEach((m, i) => d.innerHTML += `<tr class="border-b"><td class="p-2">${m.nome}</td><td class="p-2 font-bold">R$ ${m.total.toFixed(2)}</td></tr>`);
            };
            t(materiais, 'tabelaMateriais', 'materiais');
            t(produtosBase, 'tabelaProdutosBase', 'produtosBase');
            t(embalagens, 'tabelaEmbalagens', 'embalagens');
            t(maquinas, 'tabelaMaquinas', 'maquinas');
            
            let sl = document.getElementById('selectMat'); sl.innerHTML = '';
            materiais.forEach((x, i) => sl.innerHTML += `<option value="${i}">${x.nome}</option>`);
        }

        function jogarProdutoNoPedido() {
            let n = document.getElementById('nomeProdutoCalculado').value;
            pedidoCliente.push({ descricao: n, quantidade: 1, valorTotal: 0 }); // Simplificado para o exemplo
            mudarAba('aba-gerar-pedido');
        }

        function atualizarDocumentoFinal() {
            document.getElementById('printClienteNome').innerText = document.getElementById('clienteNome').value;
            let tt = document.getElementById('tabelaItensTelaOrcamento'); tt.innerHTML = '';
            pedidoCliente.forEach(x => tt.innerHTML += `<tr><td class="p-2">${x.descricao}</td></tr>`);
        }

        function enviarWhatsApp() { alert("Enviando..."); }
    </script>
</body>
</html>
